name: macOS Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate Xcode project (XcodeGen)
        run: |
          brew update
          brew install xcodegen
          xcodegen generate

      - name: Build (Release)
        run: |
          xcodebuild \
            -project MarkdownReader.xcodeproj \
            -scheme MarkdownReader \
            -configuration Release \
            -derivedDataPath build \
            build

      - name: Package app
        run: |
          APP=$(find build/Build/Products/Release -maxdepth 1 -name "*.app" -print -quit)
          if [ -z "$APP" ]; then
            echo "No .app found"; exit 1
          fi
          ditto -c -k --sequesterRsrc --keepParent "$APP" MarkdownReader-macOS.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: MarkdownReader-macOS.zip
          generate_release_notes: true
