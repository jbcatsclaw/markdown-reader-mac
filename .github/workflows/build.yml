name: macOS Build

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate Xcode project (XcodeGen)
        run: |
          brew update
          brew install xcodegen
          xcodegen generate

      - name: Build
        run: |
          xcodebuild \
            -project MarkdownReader.xcodeproj \
            -scheme MarkdownReader \
            -configuration Release \
            -derivedDataPath build \
            build

      - name: Archive app
        run: |
          APP=$(find build/Build/Products/Release -maxdepth 1 -name "*.app" -print -quit)
          if [ -z "$APP" ]; then
            echo "No .app found"; exit 1
          fi
          ditto -c -k --sequesterRsrc --keepParent "$APP" MarkdownReader.zip

      - uses: actions/upload-artifact@v4
        with:
          name: MarkdownReader-macOS
          path: MarkdownReader.zip
